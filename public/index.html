<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - TypeScript CRUD</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        .card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h2 {
            color: #667eea;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
        }
        button:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .users-list {
            display: grid;
            gap: 15px;
        }
        .user-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            transition: transform 0.2s;
        }
        .user-card:hover {
            transform: translateX(5px);
        }
        .user-name {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        .user-email {
            color: #666;
            margin-bottom: 5px;
        }
        .user-role {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .role-admin {
            background: #ff6b6b;
            color: white;
        }
        .role-editor {
            background: #4ecdc4;
            color: white;
        }
        .role-viewer {
            background: #95e1d3;
            color: #333;
        }
        .user-date {
            color: #999;
            font-size: 13px;
            margin-top: 8px;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        .error {
            background: #ff6b6b;
            color: white;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
        }
        .user-actions {
            margin-top: 12px;
            display: flex;
            gap: 10px;
        }
        .btn-edit, .btn-delete {
            padding: 8px 16px;
            font-size: 14px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-edit {
            background: #4ecdc4;
            color: white;
        }
        .btn-edit:hover {
            background: #3db8af;
        }
        .btn-delete {
            background: #ff6b6b;
            color: white;
        }
        .btn-delete:hover {
            background: #ee5a52;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: white;
            border-radius: 10px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .modal-header h2 {
            margin: 0;
        }
        .btn-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
            padding: 0;
            width: 30px;
            height: 30px;
        }
        .btn-close:hover {
            color: #333;
            transform: none;
            box-shadow: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👥 User Management System</h1>
        
        <div class="card">
            <h2>Create New User</h2>
            <div id="error-message"></div>
            <form id="user-form">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" required placeholder="Enter user name">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="user@example.com">
                </div>
                <div class="form-group">
                    <label for="role">Role</label>
                    <select id="role" required>
                        <option value="">Select a role</option>
                        <option value="admin">Admin</option>
                        <option value="editor">Editor</option>
                        <option value="viewer">Viewer</option>
                    </select>
                </div>
                <button type="submit">Add User</button>
            </form>
        </div>

        <div class="card">
            <h2>All Users (<span id="user-count">0</span>)</h2>
            <div id="users-list" class="users-list">
                <div class="empty-state">No users yet. Create one above!</div>
            </div>
        </div>
    </div>

    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit User</h2>
                <button class="btn-close" onclick="closeEditModal()">&times;</button>
            </div>
            <div id="edit-error-message"></div>
            <form id="edit-user-form">
                <input type="hidden" id="edit-user-id">
                <div class="form-group">
                    <label for="edit-name">Name</label>
                    <input type="text" id="edit-name" required placeholder="Enter user name">
                </div>
                <div class="form-group">
                    <label for="edit-email">Email</label>
                    <input type="email" id="edit-email" required placeholder="user@example.com">
                </div>
                <div class="form-group">
                    <label for="edit-role">Role</label>
                    <select id="edit-role" required>
                        <option value="admin">Admin</option>
                        <option value="editor">Editor</option>
                        <option value="viewer">Viewer</option>
                    </select>
                </div>
                <button type="submit">Update User</button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = '/api/users';

        async function fetchUsers() {
            try {
                const response = await fetch(API_URL);
                const users = await response.json();
                displayUsers(users);
            } catch (error) {
                showError('Failed to load users');
            }
        }

        function displayUsers(users) {
            const usersList = document.getElementById('users-list');
            const userCount = document.getElementById('user-count');
            
            userCount.textContent = users.length;

            if (users.length === 0) {
                usersList.innerHTML = '<div class="empty-state">No users yet. Create one above!</div>';
                return;
            }

            usersList.innerHTML = users.map(user => `
                <div class="user-card">
                    <div class="user-name">${escapeHtml(user.name)}</div>
                    <div class="user-email">📧 ${escapeHtml(user.email)}</div>
                    <span class="user-role role-${user.role}">${user.role}</span>
                    <div class="user-date">Created: ${new Date(user.createdAt).toLocaleDateString()}</div>
                    <div class="user-actions">
                        <button class="btn-edit" onclick="editUser('${user.id}')">✏️ Edit</button>
                        <button class="btn-delete" onclick="deleteUser('${user.id}', '${escapeHtml(user.name)}')">🗑️ Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showError(message) {
            const errorDiv = document.getElementById('error-message');
            errorDiv.innerHTML = `<div class="error">${message}</div>`;
            setTimeout(() => errorDiv.innerHTML = '', 3000);
        }

        function showEditError(message) {
            const errorDiv = document.getElementById('edit-error-message');
            errorDiv.innerHTML = `<div class="error">${message}</div>`;
            setTimeout(() => errorDiv.innerHTML = '', 3000);
        }

        async function editUser(userId) {
            try {
                const response = await fetch(`${API_URL}/${userId}`);
                const user = await response.json();
                
                document.getElementById('edit-user-id').value = user.id;
                document.getElementById('edit-name').value = user.name;
                document.getElementById('edit-email').value = user.email;
                document.getElementById('edit-role').value = user.role;
                
                document.getElementById('edit-modal').classList.add('active');
            } catch (error) {
                showError('Failed to load user details');
            }
        }

        function closeEditModal() {
            document.getElementById('edit-modal').classList.remove('active');
            document.getElementById('edit-user-form').reset();
        }

        async function deleteUser(userId, userName) {
            if (!confirm(`Are you sure you want to delete ${userName}?`)) {
                return;
            }

            try {
                const response = await fetch(`${API_URL}/${userId}`, {
                    method: 'DELETE'
                });

                if (!response.ok) throw new Error('Failed to delete user');

                fetchUsers();
            } catch (error) {
                showError('Failed to delete user. Please try again.');
            }
        }

        document.getElementById('user-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const userData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                role: document.getElementById('role').value
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });

                if (!response.ok) throw new Error('Failed to create user');

                e.target.reset();
                fetchUsers();
            } catch (error) {
                showError('Failed to create user. Please try again.');
            }
        });

        document.getElementById('edit-user-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const userId = document.getElementById('edit-user-id').value;
            const userData = {
                name: document.getElementById('edit-name').value,
                email: document.getElementById('edit-email').value,
                role: document.getElementById('edit-role').value
            };

            try {
                const response = await fetch(`${API_URL}/${userId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });

                if (!response.ok) throw new Error('Failed to update user');

                closeEditModal();
                fetchUsers();
            } catch (error) {
                showEditError('Failed to update user. Please try again.');
            }
        });

        document.getElementById('edit-modal').addEventListener('click', (e) => {
            if (e.target.id === 'edit-modal') {
                closeEditModal();
            }
        });

        fetchUsers();
    </script>
</body>
</html>
